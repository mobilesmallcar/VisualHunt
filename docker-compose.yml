version: "3.8"

services:
  visualhunt:
    build:
      context: .
      dockerfile: Dockerfile
    image: visualhunt:dev
    container_name: visualhunt
    # 将容器 5176 端口映射到宿主机 5176 端口（可自行修改）
    ports:
      - "5176:5176"
    # 挂载数据与配置，方便后续热更新而不需要重新构建镜像
    volumes:
      # 代码热更新：git pull 后 restart 即可生效，无需重新 build 镜像
      - ./src:/app/src
      - ./main.py:/app/main.py
      - ./data:/app/data
      - ./finetuned:/app/finetuned
      - ./runtime_config.json:/app/runtime_config.json
    restart: unless-stopped
    networks:
      - projects-net          # 新增：加入公共网络

networks:
  projects-net:
    external: true             # 新增：使用外部网络